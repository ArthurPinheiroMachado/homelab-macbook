groups:

  - name: node-alerts

    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m

        annotations:
          summary: CPU acima de 80%

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m

        annotations:
          summary: RAM acima de 90%

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
        for: 5m

        annotations:
          summary: Disco acima de 80%

      - alert: InstanceDown
        expr: up == 0
        for: 1m

        annotations:
          summary: Serviço indisponível

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m

        annotations:
          summary: Loki offline

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m

        annotations:
          summary: Grafana offline

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m

        annotations:
          summary: Prometheus offline
